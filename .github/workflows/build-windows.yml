name: Build Flutter Windows

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create .env
        shell: pwsh
        run: |
          Set-Content -Path ".env" -Value "${{ secrets.ENV_FILE }}" -Encoding UTF8

          Write-Host "===== ROOT FILES ====="
          Get-ChildItem -Force

          Write-Host "===== .env CONTENT ====="
          Get-Content .env

      - name: Check pubspec assets
        shell: pwsh
        run: |
          Write-Host "===== pubspec.yaml ====="
          Get-Content pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Clean
        run: flutter clean

      - name: Build Windows release
        run: flutter build windows --release -v

      - name: Check built flutter assets
        shell: pwsh
        run: |
          Write-Host "===== FLUTTER ASSETS ====="

          if (Test-Path "build/windows/x64/runner/Release/data/flutter_assets") {
            Get-ChildItem "build/windows/x64/runner/Release/data/flutter_assets" -Force
          } else {
            Write-Host "flutter_assets folder not found"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-release
          path: build/windows/x64/runner/Release
