name: Build Flutter Windows

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create Firebase env asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "assets" | Out-Null
          Set-Content -Path "assets/env" -Value "${{ secrets.ENV_FILE }}" -Encoding UTF8

      - name: Check Firebase env asset exists
        shell: pwsh
        run: |
          if (!(Test-Path "assets/env")) { exit 1 }
          $content = Get-Content -Raw "assets/env"
          if ($content -notmatch "(?m)^FIREBASE_PROJECT_ID=.+") { exit 1 }
          if ($content -notmatch "(?m)^FIREBASE_WEB_API_KEY=.+") { exit 1 }
          Write-Host "assets/env found with required Firebase keys"

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release -v

      - name: Check bundled Firebase env asset
        shell: pwsh
        run: |
          $assetPath = "build/windows/x64/runner/Release/data/flutter_assets/assets/env"
          if (!(Test-Path $assetPath)) { exit 1 }
          $content = Get-Content -Raw $assetPath
          if ($content -notmatch "(?m)^FIREBASE_PROJECT_ID=.+") { exit 1 }
          if ($content -notmatch "(?m)^FIREBASE_WEB_API_KEY=.+") { exit 1 }
          Write-Host "Bundled Firebase env asset found with required Firebase keys"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-release
          path: build/windows/x64/runner/Release
