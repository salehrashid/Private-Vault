name: Build Flutter Windows

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Clean
        run: flutter clean

      - name: Create Firebase env asset
        shell: pwsh
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          New-Item -ItemType Directory -Force -Path "assets" | Out-Null
          $lines = @(
            "FIREBASE_PROJECT_ID=$env:FIREBASE_PROJECT_ID",
            "FIREBASE_WEB_API_KEY=$env:FIREBASE_WEB_API_KEY"
          )
          Set-Content -Path "assets/env" -Value $lines -Encoding UTF8

      - name: Verify Firebase env asset
        shell: pwsh
        run: |
          if (!(Test-Path "assets/env")) {
            Write-Error "assets/env was not created"
            exit 1
          }
          $content = Get-Content -Raw "assets/env"
          $size = (Get-Item "assets/env").Length
          Write-Host "assets/env size: $size bytes"
          if ($content -notmatch "(?m)^FIREBASE_PROJECT_ID=.+") {
            Write-Error "FIREBASE_PROJECT_ID not found in assets/env"
            exit 1
          }
          if ($content -notmatch "(?m)^FIREBASE_WEB_API_KEY=.+") {
            Write-Error "FIREBASE_WEB_API_KEY not found in assets/env"
            exit 1
          }
          Write-Host "assets/env contains required Firebase keys"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          $buildArgs = @(
            "build",
            "windows",
            "--release",
            "-v",
            "--dart-define=FIREBASE_PROJECT_ID=$env:FIREBASE_PROJECT_ID",
            "--dart-define=FIREBASE_WEB_API_KEY=$env:FIREBASE_WEB_API_KEY"
          )
          flutter @buildArgs

      - name: Verify bundled Firebase env asset
        shell: pwsh
        run: |
          $assetPath = "build/windows/x64/runner/Release/data/flutter_assets/assets/env"
          if (!(Test-Path $assetPath)) {
            Write-Error "Bundled asset not found at $assetPath"
            exit 1
          }
          $content = Get-Content -Raw $assetPath
          $size = (Get-Item $assetPath).Length
          Write-Host "Bundled assets/env size: $size bytes"
          if ($content -notmatch "(?m)^FIREBASE_PROJECT_ID=.+") {
            Write-Error "FIREBASE_PROJECT_ID not found in bundled asset"
            exit 1
          }
          if ($content -notmatch "(?m)^FIREBASE_WEB_API_KEY=.+") {
            Write-Error "FIREBASE_WEB_API_KEY not found in bundled asset"
            exit 1
          }
          Write-Host "Bundled Firebase env asset verified successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-release
          path: build/windows/x64/runner/Release
