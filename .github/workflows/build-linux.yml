name: Build Flutter Linux

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Clean
        run: flutter clean

      - name: Create Firebase env asset
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          mkdir -p assets
          {
            printf 'FIREBASE_PROJECT_ID=%s\n' "$FIREBASE_PROJECT_ID"
            printf 'FIREBASE_WEB_API_KEY=%s\n' "$FIREBASE_WEB_API_KEY"
          } > assets/env

      - name: Verify Firebase env asset
        run: |
          if [ ! -f assets/env ]; then
            echo "assets/env was not created" >&2
            exit 1
          fi
          size="$(wc -c < assets/env)"
          echo "assets/env size: ${size} bytes"
          if ! grep -Eq '^FIREBASE_PROJECT_ID=.+' assets/env; then
            echo "FIREBASE_PROJECT_ID not found in assets/env" >&2
            exit 1
          fi
          if ! grep -Eq '^FIREBASE_WEB_API_KEY=.+' assets/env; then
            echo "FIREBASE_WEB_API_KEY not found in assets/env" >&2
            exit 1
          fi
          echo "assets/env contains required Firebase keys"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: >
          flutter build linux --release -v
          --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID"
          --dart-define=FIREBASE_WEB_API_KEY="$FIREBASE_WEB_API_KEY"

      - name: Verify bundled Firebase env asset
        run: |
          asset_path="build/linux/x64/release/bundle/data/flutter_assets/assets/env"
          if [ ! -f "$asset_path" ]; then
            echo "Bundled asset not found at $asset_path" >&2
            exit 1
          fi
          size="$(wc -c < "$asset_path")"
          echo "Bundled assets/env size: ${size} bytes"
          if ! grep -Eq '^FIREBASE_PROJECT_ID=.+' "$asset_path"; then
            echo "FIREBASE_PROJECT_ID not found in bundled asset" >&2
            exit 1
          fi
          if ! grep -Eq '^FIREBASE_WEB_API_KEY=.+' "$asset_path"; then
            echo "FIREBASE_WEB_API_KEY not found in bundled asset" >&2
            exit 1
          fi
          echo "Bundled Firebase env asset verified successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-linux-release
          path: build/linux/x64/release/bundle
